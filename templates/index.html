<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chicken Health Classifier</title>
    <meta name="description" content="AI-powered coccidiosis detection from chicken fecal images using VGG16 transfer learning.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: #0f0f1a;
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .app {
            width: 100%;
            max-width: 520px;
            animation: fadeIn 0.6s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .header h1 {
            font-size: 1.75rem;
            font-weight: 700;
            color: #ffffff;
            letter-spacing: -0.5px;
        }

        .header p {
            font-size: 0.85rem;
            color: #888;
            margin-top: 0.4rem;
            font-weight: 300;
        }

        .card {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 16px;
            padding: 2rem;
            backdrop-filter: blur(12px);
        }

        .dropzone {
            border: 2px dashed rgba(108, 99, 255, 0.4);
            border-radius: 12px;
            padding: 2.5rem 1.5rem;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
        }

        .dropzone:hover, .dropzone.drag-over {
            border-color: #6c63ff;
            background: rgba(108, 99, 255, 0.06);
        }

        .dropzone-icon {
            font-size: 2.5rem;
            margin-bottom: 0.75rem;
            display: block;
        }

        .dropzone-text {
            font-size: 0.9rem;
            color: #aaa;
        }

        .dropzone-text span {
            color: #6c63ff;
            font-weight: 500;
        }

        .dropzone input {
            position: absolute;
            inset: 0;
            opacity: 0;
            cursor: pointer;
        }

        .preview {
            margin-top: 1.5rem;
            display: none;
            text-align: center;
        }

        .preview.active { display: block; }

        .preview img {
            max-width: 100%;
            max-height: 260px;
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .preview .filename {
            font-size: 0.75rem;
            color: #666;
            margin-top: 0.5rem;
        }

        .btn {
            width: 100%;
            margin-top: 1.5rem;
            padding: 0.85rem;
            border: none;
            border-radius: 10px;
            font-family: 'Inter', sans-serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.25s ease;
            background: #6c63ff;
            color: #fff;
        }

        .btn:hover { background: #5a52e0; transform: translateY(-1px); }
        .btn:active { transform: translateY(0); }
        .btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

        .result {
            margin-top: 1.5rem;
            padding: 1.25rem;
            border-radius: 10px;
            text-align: center;
            display: none;
            animation: fadeIn 0.4s ease;
        }

        .result.active { display: block; }

        .result.healthy {
            background: rgba(46, 204, 113, 0.1);
            border: 1px solid rgba(46, 204, 113, 0.3);
        }

        .result.coccidiosis {
            background: rgba(231, 76, 60, 0.1);
            border: 1px solid rgba(231, 76, 60, 0.3);
        }

        .result-label {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: #888;
            margin-bottom: 0.4rem;
        }

        .result-value {
            font-size: 1.4rem;
            font-weight: 700;
        }

        .result.healthy .result-value { color: #2ecc71; }
        .result.coccidiosis .result-value { color: #e74c3c; }

        .spinner {
            display: none;
            margin: 1.5rem auto 0;
            width: 32px;
            height: 32px;
            border: 3px solid rgba(108, 99, 255, 0.2);
            border-top-color: #6c63ff;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }

        .spinner.active { display: block; }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .footer {
            text-align: center;
            margin-top: 1.5rem;
            font-size: 0.7rem;
            color: #444;
        }
    </style>
</head>
<body>
    <div class="app">
        <div class="header">
            <h1>Chicken Health Classifier</h1>
            <p>AI-powered coccidiosis detection from fecal images</p>
        </div>

        <div class="card">
            <div class="dropzone" id="dropzone">
                <span class="dropzone-icon">&#128193;</span>
                <div class="dropzone-text">
                    Drop an image here or <span>browse</span>
                </div>
                <input type="file" id="fileInput" accept="image/*">
            </div>

            <div class="preview" id="preview">
                <img id="previewImg" src="" alt="Preview">
                <div class="filename" id="filename"></div>
            </div>

            <button class="btn" id="predictBtn" disabled>Predict</button>

            <div class="spinner" id="spinner"></div>

            <div class="result" id="result">
                <div class="result-label">Prediction</div>
                <div class="result-value" id="resultValue"></div>
            </div>
        </div>

        <div class="footer">VGG16 Transfer Learning &middot; TensorFlow &middot; Flask</div>
    </div>

    <script>
        const dropzone = document.getElementById('dropzone');
        const fileInput = document.getElementById('fileInput');
        const preview = document.getElementById('preview');
        const previewImg = document.getElementById('previewImg');
        const filename = document.getElementById('filename');
        const predictBtn = document.getElementById('predictBtn');
        const spinner = document.getElementById('spinner');
        const result = document.getElementById('result');
        const resultValue = document.getElementById('resultValue');

        let base64Data = '';

        ['dragenter', 'dragover'].forEach(evt =>
            dropzone.addEventListener(evt, e => { e.preventDefault(); dropzone.classList.add('drag-over'); })
        );
        ['dragleave', 'drop'].forEach(evt =>
            dropzone.addEventListener(evt, e => { e.preventDefault(); dropzone.classList.remove('drag-over'); })
        );

        dropzone.addEventListener('drop', e => {
            const file = e.dataTransfer.files[0];
            if (file && file.type.startsWith('image/')) handleFile(file);
        });

        fileInput.addEventListener('change', () => {
            if (fileInput.files[0]) handleFile(fileInput.files[0]);
        });

        function handleFile(file) {
            filename.textContent = file.name;
            const reader = new FileReader();
            reader.onload = e => {
                const url = e.target.result;
                previewImg.src = url;
                preview.classList.add('active');
                result.classList.remove('active', 'healthy', 'coccidiosis');

                const img = new Image();
                img.crossOrigin = 'Anonymous';
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    canvas.width = img.width;
                    canvas.height = img.height;
                    canvas.getContext('2d').drawImage(img, 0, 0);
                    base64Data = canvas.toDataURL('image/jpeg', 1.0).replace(/^data:image.+;base64,/, '');
                    predictBtn.disabled = false;
                };
                img.src = url;
            };
            reader.readAsDataURL(file);
        }

        predictBtn.addEventListener('click', async () => {
            if (!base64Data) return;
            predictBtn.disabled = true;
            spinner.classList.add('active');
            result.classList.remove('active', 'healthy', 'coccidiosis');

            try {
                const res = await fetch('/predict', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ image: base64Data })
                });
                const data = await res.json();
                const prediction = data[0].image;
                const isHealthy = prediction.toLowerCase() === 'healthy';

                resultValue.textContent = prediction;
                result.classList.add('active', isHealthy ? 'healthy' : 'coccidiosis');
            } catch (err) {
                resultValue.textContent = 'Error — check console';
                result.classList.add('active', 'coccidiosis');
                console.error(err);
            } finally {
                spinner.classList.remove('active');
                predictBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
